# ─────────────────────────────────────────────────────────────────────────────
# Disease Prediction Modeling Pipeline — Configuration
# ─────────────────────────────────────────────────────────────────────────────

# ── Project ──────────────────────────────────────────────────────────────────
project:
  name: "Superimposed Preeclampsia Prediction"
  version: "1.0.0"
  disease: "Superimposed Preeclampsia"
  target_column: "superimposed_pe"
  random_seed: 42

# ── Data ─────────────────────────────────────────────────────────────────────
data:
  synthetic_path: "data/synthetic/synthetic_pe_cohort.csv"
  test_size: 0.20
  val_size: 0.10          # fraction of training set used for validation
  stratify: true

  # Cohort inclusion criteria (for documentation)
  cohort:
    age_min: 12
    age_max: 50
    study_period_start: "2018-06-01"
    study_period_end: "2021-07-31"
    index_condition: "chronic_hypertension"   # chronic HTN cohort → predict PE

  # ICD-10-CM codes used to define cohorts (de-identified reference)
  icd10_codes:
    chronic_hypertension:
      - "O10.0"   # pre-existing essential hypertension complicating pregnancy
      - "I10"     # essential (primary) hypertension
    superimposed_pe:
      - "O11"     # pre-existing hypertension with superimposed proteinuria
      - "O11.1"
      - "O11.2"
      - "O11.3"
      - "O11.9"
    eclampsia:
      - "O15.0"
      - "O15.1"
      - "O15.2"
      - "O15.9"
    gestational_hypertension:
      - "O13"     # gestational [pregnancy-induced] hypertension
    preeclampsia:
      - "O14.0"   # mild-to-moderate pre-eclampsia
      - "O14.1"   # severe pre-eclampsia
      - "O14.2"   # HELLP syndrome
      - "O14.9"

# ── Features ─────────────────────────────────────────────────────────────────
features:
  demographic:
    - age_at_delivery
    - race_ethnicity          # encoded
    - insurance_type          # encoded
    - parity
    - gravidity
    - multiple_gestation
    - gestational_age_at_delivery

  clinical_history:
    - chronic_hypertension_duration_yrs
    - pregestational_diabetes
    - gestational_diabetes
    - renal_disease
    - autoimmune_disorder
    - prior_pe
    - prior_preterm_birth
    - bmi_prepregnancy
    - smoking_status

  vital_signs:
    - sbp_first_trimester
    - dbp_first_trimester
    - sbp_second_trimester
    - dbp_second_trimester
    - sbp_max_antepartum
    - dbp_max_antepartum

  labs:
    - protein_urine_24h_mg
    - creatinine_mg_dl
    - platelet_count_k_ul
    - alt_u_l
    - ast_u_l
    - uric_acid_mg_dl
    - hemoglobin_g_dl
    - ldh_u_l

# ── Preprocessing ─────────────────────────────────────────────────────────────
preprocessing:
  imputation_strategy: "median"   # median | mean | knn | iterative
  knn_neighbors: 5
  scaling: "standard"             # standard | minmax | robust | none
  outlier_method: "iqr"           # iqr | zscore | isolation_forest | none
  outlier_threshold: 3.0
  encode_categoricals: true
  encoding_method: "onehot"       # onehot | ordinal | target

# ── Classical ML Models ───────────────────────────────────────────────────────
classical_ml:
  models:
    logistic_regression:
      C: [0.001, 0.01, 0.1, 1, 10, 100]
      penalty: ["l1", "l2"]
      solver: "saga"
      max_iter: 1000
      class_weight: "balanced"

    svm:
      C: [0.1, 1, 10, 100]
      kernel: ["rbf", "linear", "poly"]
      gamma: ["scale", "auto"]
      class_weight: "balanced"
      probability: true

    random_forest:
      n_estimators: [100, 300, 500]
      max_depth: [null, 5, 10, 20]
      min_samples_split: [2, 5, 10]
      class_weight: "balanced"

    xgboost:
      n_estimators: [100, 300, 500]
      max_depth: [3, 5, 7]
      learning_rate: [0.01, 0.05, 0.1]
      subsample: [0.7, 0.8, 1.0]
      colsample_bytree: [0.7, 0.8, 1.0]
      scale_pos_weight: "auto"

    lightgbm:
      n_estimators: [100, 300, 500]
      max_depth: [-1, 5, 10]
      learning_rate: [0.01, 0.05, 0.1]
      num_leaves: [31, 63, 127]
      class_weight: "balanced"

    catboost:
      iterations: [100, 300, 500]
      depth: [4, 6, 8]
      learning_rate: [0.01, 0.05, 0.1]
      auto_class_weights: "Balanced"

    decision_tree:
      max_depth: [3, 5, 10, null]
      min_samples_split: [2, 5, 10]
      class_weight: "balanced"

    knn:
      n_neighbors: [3, 5, 7, 11, 15]
      weights: ["uniform", "distance"]
      metric: ["euclidean", "manhattan"]

    naive_bayes:
      var_smoothing: [1.0e-9, 1.0e-8, 1.0e-7]

    lda:
      solver: ["svd", "lsqr"]
      shrinkage: [null, "auto"]

  cv_folds: 5
  scoring: "roc_auc"
  n_jobs: -1

# ── Deep Learning Models ──────────────────────────────────────────────────────
deep_learning:
  batch_size: 64
  max_epochs: 200
  patience: 20               # early stopping patience
  learning_rate: 0.001
  dropout_rate: 0.3
  weight_decay: 1.0e-4
  device: "cpu"              # cpu | cuda | mps

  mlp:
    hidden_dims: [256, 128, 64]
    activation: "relu"       # relu | leaky_relu | gelu | selu
    batch_norm: true

  tabnet:
    n_d: 32
    n_a: 32
    n_steps: 5
    gamma: 1.3
    momentum: 0.02
    mask_type: "sparsemax"   # sparsemax | entmax

  ft_transformer:
    d_token: 64
    n_blocks: 3
    attention_heads: 8
    ffn_factor: 4.0/3

  lstm:
    hidden_size: 128
    num_layers: 2
    bidirectional: true

  cnn_1d:
    channels: [64, 128, 64]
    kernel_sizes: [3, 3, 3]
    pool_size: 2

# ── Ensemble Models ───────────────────────────────────────────────────────────
ensemble:
  voting:
    voting_type: "soft"         # soft | hard
    base_estimators:
      - "logistic_regression"
      - "random_forest"
      - "xgboost"
      - "svm"
      - "lightgbm"

  stacking:
    base_estimators:
      - "logistic_regression"
      - "random_forest"
      - "xgboost"
      - "svm"
      - "lightgbm"
      - "mlp"
    meta_learner: "logistic_regression"
    use_proba: true
    cv_folds: 5

  blending:
    base_estimators:
      - "random_forest"
      - "xgboost"
      - "lightgbm"
      - "mlp"
    meta_learner: "logistic_regression"
    holdout_fraction: 0.2

  bayesian_averaging:
    n_samples: 1000
    prior: "uniform"

# ── Evaluation ────────────────────────────────────────────────────────────────
evaluation:
  metrics:
    - roc_auc
    - average_precision
    - accuracy
    - sensitivity          # recall
    - specificity
    - ppv                  # precision
    - npv
    - f1
    - brier_score
    - mcc                  # Matthews correlation coefficient
  bootstrap_ci:
    enabled: true
    n_iterations: 1000
    confidence_level: 0.95
  calibration:
    method: "isotonic"     # isotonic | sigmoid (Platt scaling)
    n_bins: 10

# ── Interpretability ─────────────────────────────────────────────────────────
interpretability:
  shap:
    enabled: true
    n_samples: 200
    plot_types: ["summary", "bar", "waterfall", "beeswarm"]
  lime:
    enabled: true
    n_samples: 500
  feature_importance:
    permutation: true
    n_repeats: 10

# ── Output ────────────────────────────────────────────────────────────────────
output:
  results_dir: "results"
  figures_dir: "results/figures"
  models_dir: "results/models"
  save_models: true
  figure_format: "png"   # png | pdf | svg
  figure_dpi: 300
